apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
      - name: flask-container
        image: 652942059461.dkr.ecr.us-east-1.amazonaws.com/flask-app:IMAGE_TAG
        ports:
        - containerPort: 5000
